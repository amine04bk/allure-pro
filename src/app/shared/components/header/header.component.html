<header class="header" [class.menu-open]="menuOpen">
  <div class="header__inner container">
    <a routerLink="/" class="logo" (click)="closeMenu()" aria-label="ALLURE WORKPRO — Accueil">
      <img src="/assets/brand/logo.png" alt="ALLURE WORKPRO" class="logo__image" />
    </a>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen" aria-label="Menu">
      <span></span><span></span>
    </button>

    <nav class="nav" [class.open]="menuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">Accueil</a>
      <a routerLink="/catalogue" routerLinkActive="active" (click)="closeMenu()">Catalogue</a>
      <a routerLink="/catalogue/responsable-salle" routerLinkActive="active" (click)="closeMenu()">Responsable de Salle</a>
      <a routerLink="/catalogue/chef" routerLinkActive="active" (click)="closeMenu()">Chef</a>
      <a routerLink="/catalogue/tabliers" routerLinkActive="active" (click)="closeMenu()">Tabliers</a>
      <a routerLink="/personnalisation" routerLinkActive="active" (click)="closeMenu()">Personnalisation</a>
    </nav>

    <a routerLink="/panier" class="cart-btn" (click)="closeMenu()" aria-label="Panier">
      <span class="cart-btn__label">Panier</span>
      @if (cart.count() > 0) {
        <span class="cart-btn__count">{{ cart.count() }}</span>
      }
    </a>
  </div>
</header>
